name: Publish to Open VSX

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (must match package.json)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Verify input version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ inputs.version }}" ]; then
            echo "Input version '${{ inputs.version }}' does not match package.json version '$PKG_VERSION'"
            exit 1
          fi

      - run: npm test

      - name: Package extension
        run: npx vsce package

      - name: Publish to Open VSX
        run: npx ovsx publish *.vsix -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - uses: actions/upload-artifact@v4
        with:
          name: open-closest-${{ inputs.version }}.vsix
          path: '*.vsix'
